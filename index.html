<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Synthetic Financial API</title>

<style>

body{
background:#0b0f14;
color:#d7fff3;
font-family:monospace;
margin:0;
}

.container{
display:flex;
height:100vh;
}

.left{
width:60%;
padding:40px;
overflow:auto;
}

.right{
width:40%;
background:#020304;
border-left:2px solid #1b2c30;
padding:20px;
}

#stream{
height:95%;
overflow:auto;
font-size:12px;
}

button{
padding:10px;
margin:5px;
background:#49ffd2;
border:none;
cursor:pointer;
}

pre{
background:#020304;
padding:20px;
}

.endpoint{
background:#111;
padding:10px;
margin:5px 0;
border-left:3px solid #49ffd2;
}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h1>Synthetic Financial Universe API</h1>

<p>$0.01 per API call</p>

<hr>

<h2>Create API Key</h2>

<button onclick="createKey()">Generate API Key</button>

<pre id="key"></pre>

<hr>

<h2>API Playground</h2>

<button onclick="callAPI('entity')">/api/entity</button>
<button onclick="callAPI('bank')">/api/bank</button>
<button onclick="callAPI('account')">/api/account</button>
<button onclick="callAPI('device')">/api/device</button>
<button onclick="callAPI('transaction')">/api/transaction</button>
<button onclick="callAPI('fraud-ring')">/api/fraud-ring</button>
<button onclick="callAPI('aml-flow')">/api/aml-flow</button>
<button onclick="callAPI('session')">/api/session</button>

<pre id="result"></pre>

</div>

<div class="right">

<h2>Live Data Stream</h2>

<pre id="stream">connecting...</pre>

</div>

</div>

<script>

const API=window.location.origin

let KEY=""

async function createKey(){

const r=await fetch(API+"/create-key",{method:"POST"})
const data=await r.json()

KEY=data.api_key

document.getElementById("key").textContent=
JSON.stringify(data,null,2)

}

async function callAPI(endpoint){

if(!KEY){
alert("create key first")
return
}

const r=await fetch(API+"/api/"+endpoint,{
headers:{ "x-api-key":KEY }
})

const data=await r.json()

document.getElementById("result").textContent=
JSON.stringify(data,null,2)

}

/* STREAM */

const streamBox=document.getElementById("stream")

const stream=new EventSource(API+"/stream")

let lines=[]

stream.onmessage=function(e){

lines.unshift(e.data)

if(lines.length>30){
lines.pop()
}

streamBox.textContent=lines.join("\n")

}

</script>

</body>
</html>
